<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS — AI Health Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
        // Block fullscreen API so Jitsi iframe stays inside modal
        const _noFullscreen = () => Promise.resolve();
        Element.prototype.requestFullscreen = _noFullscreen;
        Element.prototype.webkitRequestFullscreen = _noFullscreen;
        Element.prototype.mozRequestFullScreen = _noFullscreen;
        Element.prototype.msRequestFullscreen = _noFullscreen;
        document.exitFullscreen = _noFullscreen;
    </script>
</head>
<body>
    <div class="app-container">

        <!-- Status dot (top-right corner) -->
        <div class="ws-status" id="ws-status">
            <div class="status-dot"></div>
            <span class="status-text">CONNECTING...</span>
        </div>

        <!-- Test Speaker — top-left corner -->
        <button class="test-audio-btn" id="test-audio-btn" title="ทดสอบลำโพง">
            <div class="test-icon" style="display: flex; align-items: center; justify-content: center; color: #ffffff;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </div>
        </button>

        <!-- Clear History — below test audio -->
        <button class="clear-history-btn" id="clear-history-btn" title="ลบประวัติการสนทนา">
            <div class="clear-icon" style="display: flex; align-items: center; justify-content: center; color: #ffffff;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </div>
        </button>

        <!-- Camera Button — below trash -->
        <button class="camera-btn" id="camera-btn" title="ถ่ายรูปทันที">
            <div class="camera-icon" style="display: flex; align-items: center; justify-content: center; color: #ffffff;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>
        </button>

        <!-- Telemedicine Button — below camera -->
        <button class="telemed-btn" id="telemed-manual-btn" title="โทรหาหมอ">
            <div class="telemed-btn-icon" style="display: flex; align-items: center; justify-content: center; color: #ffffff;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3v6a6 6 0 0 0 12 0V3M12 15v4a3 3 0 0 0 6 0v-4M18 19h2"></path>
                    <circle cx="3" cy="3" r="1" fill="currentColor"></circle>
                    <circle cx="15" cy="3" r="1" fill="currentColor"></circle>
                </svg>
            </div>
        </button>

        <!-- Pause/Sleep AI Button — below telemed -->
        <button class="pause-btn" id="pause-ai-btn" title="พักการทำงาน AI">
            <div class="pause-icon" style="display: flex; align-items: center; justify-content: center; color: #ffffff;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </div>
        </button>


        <!-- Main Face Area -->
        <main class="main-display">

            <!-- Robot Face Stage (tap to talk) -->
            <div class="face-stage" id="face-stage">
                <!-- Sleep Zzz Container -->
                <div class="sleep-zzz-container" id="sleep-zzz-container"></div>


                <!-- Ambient glow rings around face -->
                <div class="ambient-ring ring-1"></div>
                <div class="ambient-ring ring-2"></div>
                <div class="ambient-ring ring-3"></div>

                <!-- Countdown arc overlay on face -->
                <div class="ptt-countdown-arc face-countdown-arc" id="ptt-countdown-arc"></div>

                <!-- Robot Head with Eyes -->
                <div class="robot-head">

                    <!-- State Badge -->
                    <div class="robot-state-badge" id="state-badge">STANDBY</div>

                    <!-- Eyes Container -->
                    <div class="robot-eyes-row">

                        <!-- LEFT EYE -->
                        <div class="eye-wrap" id="eye-left">
                            <!-- Eyebrow -->
                            <svg class="eyebrow" id="brow-left" viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
                                <path class="brow-path" id="brow-path-left" d="M 4,14 Q 30,8 56,12" />
                            </svg>
                            <div class="eye-outer-glow"></div>
                            <div class="eye-socket">
                                <div class="eye-white">
                                    <div class="iris" id="iris-left">
                                        <div class="iris-inner"></div>
                                        <div class="pupil">
                                            <div class="pupil-highlight"></div>
                                            <div class="pupil-highlight-sm"></div>
                                        </div>
                                    </div>
                                    <!-- Shine overlay -->
                                    <div class="eye-shine"></div>
                                </div>
                                <!-- Eyelids -->
                                <div class="eyelid eyelid-top" id="eyelid-top-left"></div>
                                <div class="eyelid eyelid-bottom" id="eyelid-bot-left"></div>
                            </div>
                        </div>

                        <!-- RIGHT EYE -->
                        <div class="eye-wrap" id="eye-right">
                            <!-- Eyebrow -->
                            <svg class="eyebrow" id="brow-right" viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
                                <path class="brow-path" id="brow-path-right" d="M 4,12 Q 30,8 56,14" />
                            </svg>
                            <div class="eye-outer-glow"></div>
                            <div class="eye-socket">
                                <div class="eye-white">
                                    <div class="iris" id="iris-right">
                                        <div class="iris-inner"></div>
                                        <div class="pupil">
                                            <div class="pupil-highlight"></div>
                                            <div class="pupil-highlight-sm"></div>
                                        </div>
                                    </div>
                                    <div class="eye-shine"></div>
                                </div>
                                <div class="eyelid eyelid-top" id="eyelid-top-right"></div>
                                <div class="eyelid eyelid-bottom" id="eyelid-bot-right"></div>
                            </div>
                        </div>

                    </div><!-- /robot-eyes-row -->

                    <!-- Mouth (replaces name plate) -->
                    <div class="mouth-area">
                        <!-- Static mouth shape -->
                        <svg class="mouth-svg" id="mouth-svg" viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg">
                            <path class="mouth-path" id="mouth-path" d="M 10,15 Q 40,18 70,15" />
                        </svg>
                        <!-- Listening bars (shown when LISTENING — replaces mouth) -->
                        <div class="listen-bars" id="listen-bars">
                            <span></span><span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>

                </div><!-- /robot-head -->

                <!-- Tap hint (shown only in idle) -->
                <div class="face-tap-hint" id="face-tap-hint">แตะเพื่อพูดคุย</div>

            </div><!-- /face-stage -->



            <!-- Floating Speech Bubble -->
            <div class="speech-bubble" id="speech-bubble">
                <p id="bubble-text"></p>
            </div>

            <!-- Status Indicator -->
            <div class="status-indicator" id="status-indicator">
                <span class="mic-indicator" id="mic-indicator" style="display: inline-flex; align-items: center; justify-content: center; color: var(--iris-listen);">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 3px var(--glow-listen));">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </span>
                <div class="status-dots" id="status-dots">
                    <span></span><span></span><span></span>
                </div>
                <span class="status-hint" id="status-hint">READY</span>
            </div>

        </main>
    </div>

    <!-- Telemedicine Overlay — modal card -->
    <div class="telemedicine-overlay" id="telemed-overlay">
        <div class="telemed-card">
            <div class="telemed-card-header" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                <span style="display: inline-flex; align-items: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v6a6 6 0 0 0 12 0V3M12 15v4a3 3 0 0 0 6 0v-4M18 19h2"></path>
                        <circle cx="3" cy="3" r="1" fill="currentColor"></circle>
                        <circle cx="15" cy="3" r="1" fill="currentColor"></circle>
                    </svg>
                    กำลังต่อสายหาคุณหมอ...
                </span>
                <button class="btn btn-danger" id="end-telemed-btn" style="padding:6px 16px; font-size:13px; border-radius:50px; display: inline-flex; align-items: center; gap: 6px;">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path>
                        <line x1="23" y1="1" x2="1" y2="23"></line>
                    </svg>
                    วางสาย
                </button>
            </div>
            <!-- iframe จะถูก inject ตรงนี้โดย JS -->
            <div id="jitsi-container" style="flex:1; position:relative;"></div>
        </div>
    </div>

    <!-- Reminder Alert Modal -->
    <div class="alert-overlay" id="reminder-alert-overlay">
        <div class="alert-modal">
            <div class="alert-icon" style="display: flex; align-items: center; justify-content: center; color: #f59e0b;">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </div>
            <h2 id="reminder-alert-title">ถึงเวลาทานยาแล้ว!</h2>
            <p id="reminder-alert-body">ข้อมูลรายละเอียดการทานยา</p>
            <div class="alert-actions">
                <button class="btn btn-success" id="ack-reminder-btn">รับทราบและทานยาแล้ว ✓</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
